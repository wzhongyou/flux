version: "3.8"

services:
  flux:
    build: .
    ports:
      - "9876:9876"
    volumes:
      - flux-data:/data
    environment:
      - FLUX_ADDR=:9876
      - FLUX_WAL_PATH=/data/flux.wal
      - FLUX_SNAPSHOT_PATH=/data/snapshot.json
      - FLUX_SNAPSHOT_INTERVAL=300
      - FLUX_LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9876/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 2s

volumes:
  flux-data:
